name: backend-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neye_test
          POSTGRES_PASSWORD: neye_test
          POSTGRES_DB: neye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neye_test -d neye_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://neye_test:neye_test@127.0.0.1:5432/neye_test?schema=public
      JWT_SECRET: ci-only-neye-jwt-secret-with-sufficient-length
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: sh -n docker-entrypoint.sh
      - run: pnpm prisma validate
      - run: pnpm prisma:generate
      - name: Prepare ephemeral test database
        run: pnpm prisma db push --skip-generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
