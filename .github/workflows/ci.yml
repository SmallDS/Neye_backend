name: backend-ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neye_test
          POSTGRES_PASSWORD: neye_test
          POSTGRES_DB: neye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neye_test -d neye_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://neye_test:neye_test@127.0.0.1:5432/neye_test?schema=public
      JWT_SECRET: ci-only-neye-jwt-secret-with-sufficient-length
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: sh -n docker-entrypoint.sh
      - run: sh -n scripts/neye-db.sh
      - run: sh test/docker-entrypoint.test.sh
      - run: sh test/neye-db.test.sh
      - run: pnpm prisma validate
      - run: pnpm prisma:generate
      - name: Verify legacy database update SQL
        run: |
          pnpm prisma db execute --file prisma/manual-updates/20260719_import_task_row_idempotency.sql --schema prisma/schema.prisma
          pnpm prisma db execute --file test/sql/setup-legacy-import-task-rows.sql --schema prisma/schema.prisma
          pnpm prisma db execute --file prisma/manual-updates/20260719_import_task_row_idempotency.sql --schema prisma/schema.prisma
          pnpm prisma db execute --file prisma/manual-updates/20260719_import_task_row_idempotency.sql --schema prisma/schema.prisma
          pnpm prisma db execute --file test/sql/assert-import-task-row-idempotency.sql --schema prisma/schema.prisma
      - name: Prepare ephemeral test database
        run: pnpm prisma db push --skip-generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  publish-image:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/neye-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
